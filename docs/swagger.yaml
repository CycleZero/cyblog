definitions:
  article.BatchDeleteRequest:
    properties:
      ids:
        description: 文章ID列表
        items:
          type: integer
        minItems: 1
        type: array
    required:
    - ids
    type: object
  article.BatchUpdateStatusRequest:
    properties:
      ids:
        description: 文章ID列表
        items:
          type: integer
        minItems: 1
        type: array
      status:
        description: 状态 1:草稿 2:已发布 3:待审核
        enum:
        - 1
        - 2
        - 3
        type: integer
    required:
    - ids
    - status
    type: object
  article.CreateRequest:
    properties:
      category_id:
        description: 分类ID
        type: integer
      content:
        description: |-
          内容
          required: true
        type: string
      cover_image:
        description: |-
          封面图片
          format: url
        type: string
      is_original:
        description: 是否原创
        type: boolean
      is_top:
        description: 是否置顶
        type: boolean
      slug:
        description: |-
          别名
          max length: 100
        maxLength: 100
        type: string
      status:
        description: |-
          状态 1:草稿 2:已发布 3:私密
          required: true
          enum: 1,2,3
        enum:
        - 1
        - 2
        - 3
        type: integer
      summary:
        description: |-
          摘要
          max length: 500
        maxLength: 500
        type: string
      tag_ids:
        description: 标签ID列表
        items:
          type: integer
        type: array
      title:
        description: |-
          标题
          required: true
          max length: 255
        maxLength: 255
        type: string
    required:
    - content
    - title
    type: object
  article.DashboardResponse:
    properties:
      articleCount:
        description: 文章总数
        type: integer
      hotArticles:
        description: 热门文章
        items:
          $ref: '#/definitions/article.HotArticleSimple'
        type: array
      recentArticles:
        description: 近期文章
        items:
          $ref: '#/definitions/article.RecentArticleSimple'
        type: array
      todayViews:
        description: 今日浏览量
        type: integer
    type: object
  article.HotArticleSimple:
    properties:
      id:
        description: 文章ID
        type: integer
      title:
        description: 标题
        type: string
      views:
        description: 浏览量
        type: integer
    type: object
  article.ListResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/article.Response'
        type: array
      page:
        description: 当前页码
        type: integer
      page_size:
        description: 每页数量
        type: integer
      total:
        description: 总数
        type: integer
    type: object
  article.RecentArticleSimple:
    properties:
      id:
        description: 文章ID
        type: integer
      status:
        description: 状态
        type: integer
      title:
        description: 标题
        type: string
    type: object
  article.Response:
    properties:
      author:
        description: 作者
        properties:
          avatar:
            description: 头像
            type: string
          id:
            description: 作者ID
            type: integer
          name:
            description: 作者名
            type: string
        type: object
      category:
        allOf:
        - $ref: '#/definitions/category.Response'
        description: 分类
      cover_image:
        description: 封面图片
        type: string
      created_at:
        description: 创建时间
        type: string
      id:
        description: 文章ID
        type: integer
      is_original:
        description: 是否原创
        type: boolean
      is_top:
        description: 是否置顶
        type: boolean
      likes:
        description: 点赞数
        type: integer
      slug:
        description: 别名
        type: string
      status:
        description: 状态
        type: integer
      summary:
        description: 摘要
        type: string
      tags:
        description: 标签列表
        items:
          $ref: '#/definitions/tag.Response'
        type: array
      title:
        description: 标题
        type: string
      updated_at:
        description: 更新时间
        type: string
      views:
        description: 浏览量
        type: integer
    type: object
  article.SetTopRequest:
    properties:
      is_top:
        description: 是否置顶
        type: boolean
    type: object
  article.UpdateRequest:
    properties:
      category_id:
        description: 分类ID
        type: integer
      content:
        description: 内容
        type: string
      cover_image:
        description: |-
          封面图片
          format: url
        type: string
      id:
        description: |-
          文章ID
          required: true
        type: integer
      is_original:
        description: 是否原创
        type: boolean
      is_top:
        description: 是否置顶
        type: boolean
      slug:
        description: |-
          别名
          max length: 100
        maxLength: 100
        type: string
      status:
        description: |-
          状态 1:草稿 2:已发布 3:私密
          enum: 1,2,3
        enum:
        - 1
        - 2
        - 3
        type: integer
      summary:
        description: |-
          摘要
          max length: 500
        maxLength: 500
        type: string
      tag_ids:
        description: 标签ID列表
        items:
          type: integer
        type: array
      title:
        description: |-
          标题
          max length: 255
        maxLength: 255
        type: string
    required:
    - id
    type: object
  auth.LoginRequest:
    properties:
      account:
        description: |-
          账号（用户名或邮箱）
          required: true
        type: string
      password:
        description: |-
          密码
          required: true
          min length: 6
          max length: 20
        maxLength: 20
        minLength: 6
        type: string
    required:
    - account
    - password
    type: object
  auth.LoginResponse:
    properties:
      avatar:
        description: 头像
        type: string
      email:
        description: 邮箱
        type: string
      id:
        description: 用户ID
        type: integer
      name:
        description: 用户名
        type: string
      role:
        description: 角色
        type: string
      token:
        description: 认证Token
        type: string
    type: object
  auth.RegisterRequest:
    properties:
      email:
        description: |-
          邮箱
          required: true
          format: email
        type: string
      name:
        description: |-
          用户名
          required: true
          min length: 2
          max length: 20
        maxLength: 20
        minLength: 2
        type: string
      password:
        description: |-
          密码
          required: true
          min length: 6
          max length: 20
        maxLength: 20
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  auth.RegisterResponse:
    properties:
      avatar:
        description: 头像
        type: string
      email:
        description: 邮箱
        type: string
      id:
        description: 用户ID
        type: integer
      name:
        description: 用户名
        type: string
      token:
        description: 认证Token
        type: string
    type: object
  category.CreateRequest:
    properties:
      description:
        description: |-
          分类描述
          max length: 200
        maxLength: 200
        type: string
      name:
        description: |-
          分类名称
          required: true
          max length: 50
        maxLength: 50
        type: string
      parent_id:
        description: 父分类ID
        type: integer
      slug:
        description: |-
          分类别名
          required: true
          max length: 50
        maxLength: 50
        type: string
      sort:
        description: 排序
        type: integer
    required:
    - name
    - slug
    type: object
  category.ListResponse:
    properties:
      list:
        description: 分类列表
        items:
          $ref: '#/definitions/category.Response'
        type: array
      page:
        description: 当前页码
        type: integer
      page_size:
        description: 每页数量
        type: integer
      total:
        description: 总数
        type: integer
    type: object
  category.Response:
    properties:
      created_at:
        description: 创建时间
        type: string
      description:
        description: 分类描述
        type: string
      id:
        description: 分类ID
        type: integer
      name:
        description: 分类名称
        type: string
      parent_id:
        description: 父分类ID
        type: integer
      slug:
        description: 分类别名
        type: string
      sort:
        description: 排序
        type: integer
      updated_at:
        description: 更新时间
        type: string
    type: object
  category.UpdateRequest:
    properties:
      description:
        description: |-
          分类描述
          max length: 200
        maxLength: 200
        type: string
      id:
        description: |-
          分类ID
          required: true
        type: integer
      name:
        description: |-
          分类名称
          max length: 50
        maxLength: 50
        type: string
      parent_id:
        description: 父分类ID
        type: integer
      slug:
        description: |-
          分类别名
          max length: 50
        maxLength: 50
        type: string
      sort:
        description: 排序
        type: integer
    required:
    - id
    type: object
  comment.ArticleCommentCountResponse:
    properties:
      article_id:
        type: integer
      comment_count:
        type: integer
    type: object
  comment.CreateRequest:
    properties:
      article_id:
        type: integer
      content:
        maxLength: 2000
        minLength: 1
        type: string
      parent_id:
        description: 0表示一级评论
        type: integer
    required:
    - article_id
    - content
    type: object
  comment.ListResponse:
    properties:
      list:
        items:
          $ref: '#/definitions/comment.Response'
        type: array
      page:
        description: 当前页码
        type: integer
      page_size:
        description: 每页数量
        type: integer
      total:
        description: 总数
        type: integer
    type: object
  comment.Response:
    properties:
      article_id:
        type: integer
      content:
        type: string
      created_at:
        type: string
      id:
        type: integer
      is_liked:
        description: 当前用户是否已点赞
        type: boolean
      likes:
        type: integer
      parent_id:
        type: integer
      replies:
        description: 子评论（分页查询时一级评论不包含回复，需要单独查询）
        items:
          $ref: '#/definitions/comment.Response'
        type: array
      reply_to:
        allOf:
        - $ref: '#/definitions/dto.User'
        description: 回复评论时包含被回复的用户信息
      updated_at:
        type: string
      user:
        $ref: '#/definitions/dto.User'
      user_id:
        type: integer
    type: object
  comment.UpdateRequest:
    properties:
      content:
        maxLength: 2000
        minLength: 1
        type: string
      id:
        type: integer
    required:
    - content
    - id
    type: object
  common.Response:
    properties:
      code:
        description: 响应码
        type: integer
      data:
        description: 响应数据
      msg:
        description: 响应消息
        type: string
    type: object
  dto.User:
    properties:
      avatar:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  tag.CreateRequest:
    properties:
      color:
        description: |-
          标签颜色（十六进制）
          format: hexcolor
        type: string
      name:
        description: |-
          标签名称
          required: true
          max length: 50
        maxLength: 50
        type: string
      slug:
        description: |-
          标签别名
          required: true
          max length: 50
        maxLength: 50
        type: string
    required:
    - name
    - slug
    type: object
  tag.ListResponse:
    properties:
      list:
        description: 标签列表
        items:
          $ref: '#/definitions/tag.Response'
        type: array
      page:
        description: 当前页码
        type: integer
      page_size:
        description: 每页数量
        type: integer
      total:
        description: 总数
        type: integer
    type: object
  tag.Response:
    properties:
      color:
        description: 标签颜色
        type: string
      count:
        description: 使用数量
        type: integer
      created_at:
        description: 创建时间
        type: string
      id:
        description: 标签ID
        type: integer
      name:
        description: 标签名称
        type: string
      slug:
        description: 标签别名
        type: string
      updated_at:
        description: 更新时间
        type: string
    type: object
  tag.UpdateRequest:
    properties:
      color:
        description: |-
          标签颜色（十六进制）
          format: hexcolor
        type: string
      id:
        description: |-
          标签ID
          required: true
        type: integer
      name:
        description: |-
          标签名称
          max length: 50
        maxLength: 50
        type: string
      slug:
        description: |-
          标签别名
          max length: 50
        maxLength: 50
        type: string
    required:
    - id
    type: object
  user.AdminListResponse:
    properties:
      list:
        description: 用户列表
        items:
          $ref: '#/definitions/user.AdminUserDTO'
        type: array
      page:
        description: 当前页
        type: integer
      total:
        description: 总数
        type: integer
    type: object
  user.AdminUserDTO:
    properties:
      avatar:
        description: 头像
        type: string
      createdAt:
        description: 创建时间
        type: string
      email:
        description: 邮箱
        type: string
      id:
        description: 用户ID
        type: integer
      name:
        description: 用户名
        type: string
      role:
        description: 角色
        type: string
      status:
        description: 状态
        type: integer
    type: object
  user.GetUserRequest:
    properties:
      id:
        description: 用户ID
        type: integer
    type: object
  user.GetUserResponse:
    properties:
      avatar:
        description: 头像
        type: string
      email:
        description: 邮箱
        type: string
      id:
        description: 用户ID
        type: integer
      name:
        description: 用户名
        type: string
      role:
        description: 角色
        type: string
      status:
        description: 状态
        type: integer
    type: object
  user.UpdateRoleRequest:
    properties:
      role:
        description: 角色
        type: string
    required:
    - role
    type: object
  user.UpdateStatusRequest:
    properties:
      status:
        description: 状态
        type: integer
    required:
    - status
    type: object
  user.UpdateUserRequest:
    properties:
      avatar:
        description: |-
          头像
          format: url
        type: string
      email:
        description: |-
          邮箱
          format: email
        type: string
      name:
        description: |-
          用户名
          min length: 2
          max length: 20
        maxLength: 20
        minLength: 2
        type: string
      password:
        description: |-
          密码
          min length: 6
          max length: 20
        maxLength: 20
        minLength: 6
        type: string
    type: object
  user.UserInfoResponse:
    properties:
      avatar:
        description: 头像
        type: string
      created_at:
        description: 创建时间
        type: string
      email:
        description: 邮箱
        type: string
      id:
        description: 用户ID
        type: integer
      name:
        description: 用户名
        type: string
      role:
        description: 角色
        type: string
      status:
        description: 状态
        type: integer
    type: object
info:
  contact: {}
paths:
  /api/admin/articles:
    get:
      consumes:
      - application/json
      description: 获取所有文章列表，支持分页和筛选，需要管理员权限
      parameters:
      - description: 关键词搜索
        in: query
        name: keyword
        type: string
      - description: 分类ID
        in: query
        name: category_id
        type: integer
      - description: 状态
        enum:
        - 1
        - 2
        - 3
        in: query
        name: status
        type: integer
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/article.ListResponse'
              type: object
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: 管理端获取文章列表
      tags:
      - 管理-文章
  /api/admin/articles/{id}/top:
    put:
      consumes:
      - application/json
      description: 设置或取消文章的置顶状态，需要管理员权限
      parameters:
      - description: 文章ID
        in: path
        name: id
        required: true
        type: integer
      - description: 置顶请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/article.SetTopRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 设置成功
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: 无效的文章ID或参数错误
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: 置顶/取消置顶文章
      tags:
      - 管理-文章
  /api/admin/articles/batch-delete:
    post:
      consumes:
      - application/json
      description: 批量删除选中的文章，需要管理员权限
      parameters:
      - description: 批量删除请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/article.BatchDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: 请选择要删除的文章
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: 批量删除文章
      tags:
      - 管理-文章
  /api/admin/articles/batch-status:
    put:
      consumes:
      - application/json
      description: 批量更新选中的文章状态（草稿/已发布/待审核），需要管理员权限
      parameters:
      - description: 批量更新状态请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/article.BatchUpdateStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 更新成功
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: 参数错误或无效的状态值
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: 未授权
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: 批量更新文章状态
      tags:
      - 管理-文章
  /api/admin/comments:
    get:
      consumes:
      - application/json
      description: 分页获取所有评论列表，需要管理员权限
      parameters:
      - description: 搜索关键词
        in: query
        name: keyword
        type: string
      - description: 文章ID
        in: query
        name: article_id
        type: integer
      - description: 用户ID
        in: query
        name: user_id
        type: integer
      - default: created_at
        description: 排序字段
        in: query
        name: sort_by
        type: string
      - default: desc
        description: 排序方式
        in: query
        name: sort_order
        type: string
      - default: 1
        description: 页码
        in: query
        name: page
        type: integer
      - default: 10
        description: 每页数量
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 获取成功
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/comment.ListResponse'
              type: object
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: 无权限
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: 服务器内部错误
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: 管理端获取评论列表
      tags:
      - 评论管理
  /api/admin/comments/{id}:
    delete:
      consumes:
      - application/json
      description: 删除指定评论，需要管理员权限
      parameters:
      - description: 评论ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: 删除成功
          schema:
            $ref: '#/definitions/common.Response'
        "400":
          description: 无效的评论ID
          schema:
            $ref: '#/definitions/common.Response'
        "401":
          description: 未认证
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: 无权限
          schema:
